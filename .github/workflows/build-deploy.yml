name: DevSecOps Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    environment: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swbanga
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          POSTGRES_DB: fastapi_test
        # Mapped to 5433 to align perfectly with your conftest.py engine
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Blueprint
        uses: actions/checkout@v4

      - name: Forge Python Kernel
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Inject Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Execute QA Matrix
        env:
          DATABASE_HOSTNAME: localhost
          DATABASE_PORT: 5433
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME: fastapi_test
          DATABASE_USERNAME: swbanga
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
        run: pytest -v -s

  delivery-layer:
    needs: integration-tests
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout Blueprint
        uses: actions/checkout@v4

      - name: Authenticate Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Forge and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: swbanga1/fastapi:latest

  deployment-layer:
    needs: delivery-layer
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Secure Shell Execution (Azure VM)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd /home/swbanga/app/src
            # The DevSecOps Hard Reset
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose-prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d